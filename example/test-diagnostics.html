<!DOCTYPE html>
<html>
<head>
    <title>Django Cotton Diagnostic Testing</title>
</head>
<body>
    <!-- These should work and have hover documentation -->
    <c-card title="Working Card">
        Content goes here
    </c-card>

    <c-ui.button type="submit" variant="primary" >
        Submit Form
    </c-ui.button>

    <!-- These should show red underlines (unknown components) -->
    <c-nonexistent-component />
    
    <c-another.missing.component>
        This component doesn't exist
    </c-another.missing.component>

    <c-ui.missing-button />

    <!-- This should work -->
    <c-ui.button disabled="true">
        Disabled Button
    </c-ui.button>
</body>
</html>
